<!DOCTYPE html>
<html lang="zh-CN">

            display: flex;
            justify-content: center;

        p { color: #8b949e; font-size: 1.1rem; line-height: 1.6; }

            padding: 0.25rem 0.5rem;
            background-color: #21262d;
            border: 1px solid #30363d;
            border-radius: 20px;
            font-size: 0.85rem;
